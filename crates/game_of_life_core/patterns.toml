# Pattern library configuration.  Read by build.rs at `cargo build` time:
# each entry's RLE is fetched from the URL (or loaded from
# patterns_cache/<ident>.rle if already cached), parsed, and emitted as
# a `pub const Pattern` in the generated patterns module.
#
# Categories used to populate the per-category indices in the generated
# code:
#   methuselah  → ALL_METHUSELAHS  (chaos / unpredictable evolution)
#   spaceship   → ALL_SPACESHIPS   (translates across the world)
#   oscillator  → ALL_OSCILLATORS  (cycles forever)
#   gun         → ALL_GUNS         (emits spaceships forever — excluded
#                                   from auto-reseed pool, accumulates
#                                   debris too aggressively)
#   still_life  → ALL_STILL_LIFES  (excluded from auto-reseed pool —
#                                   never decays)
#
# `ident` is the Rust constant name (uppercase snake-case).  Existing
# tests reference R_PENTOMINO, ACORN, etc. — preserve those idents.
#
# `name` is the human-readable label baked into the Pattern at runtime.
#
# `url` is the LifeWiki RLE URL.  If the fetch fails (network, 404,
# parse error), the pattern is skipped with a warning to stderr but
# the build still succeeds — this keeps offline builds working as long
# as patterns_cache/ is populated, and a single broken upstream URL
# doesn't break the build.

